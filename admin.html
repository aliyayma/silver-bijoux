<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Bijoux | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="adminPanel()">

    <div x-show="!isLoggedIn" class="h-screen flex items-center justify-center bg-white px-6">
        <div class="max-w-sm w-full space-y-6 text-center">
            <h1 class="text-2xl font-bold tracking-widest uppercase italic">Silver Bijoux Admin</h1>
            <input type="password" x-model="password" placeholder="Enter Admin Password" class="w-full border-b border-slate-200 py-4 text-sm outline-none focus:border-black transition">
            <button @click="login()" class="w-full bg-black text-white py-4 text-[10px] uppercase font-bold tracking-widest hover:bg-slate-800 transition">Access Dashboard</button>
            <p x-show="error" class="text-red-500 text-[10px] uppercase mt-2">Wrong Password</p>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen p-8">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-xl font-semibold italic">Product Management</h2>
                <button @click="isLoggedIn = false; password = ''" class="text-[10px] uppercase font-bold tracking-widest text-slate-400 hover:text-red-500">Logout</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                
                <div class="lg:col-span-1 bg-white p-8 shadow-sm border border-slate-100 rounded-sm space-y-5">
                    <h3 class="text-xs uppercase font-bold tracking-[0.2em] mb-4">Add New Treasure</h3>
                    <input type="text" x-model="newProduct.name" placeholder="Product Name" class="w-full border-b border-slate-100 py-3 text-xs outline-none focus:border-black">
                    <input type="number" x-model="newProduct.price" placeholder="Price ($)" class="w-full border-b border-slate-100 py-3 text-xs outline-none focus:border-black">
                    <input type="text" x-model="newProduct.image" placeholder="Image URL / Path" class="w-full border-b border-slate-100 py-3 text-xs outline-none focus:border-black">
                    <select x-model="newProduct.category" class="w-full border-b border-slate-100 py-3 text-xs outline-none bg-transparent">
                        <option value="Rings">Rings</option>
                        <option value="Necklaces">Necklaces</option>
                        <option value="Earrings">Earrings</option>
                    </select>
                    <button @click="addProduct()" class="w-full bg-slate-900 text-white py-4 text-[9px] uppercase font-bold tracking-widest hover:bg-slate-700">Add to JSON</button>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-slate-900 text-slate-300 p-6 rounded-sm shadow-xl relative">
                        <h3 class="text-[10px] uppercase text-white font-bold mb-4">Current products.json content</h3>
                        <pre class="text-[10px] leading-relaxed overflow-x-auto h-64" x-text="JSON.stringify(productList, null, 2)"></pre>
                        <button @click="copyToClipboard()" class="absolute top-4 right-4 text-[9px] bg-white/10 px-3 py-1 hover:bg-white/20 transition">Copy JSON</button>
                    </div>
                    <p class="text-[10px] text-slate-400 italic font-light">Copy the code above and paste it into your <b>products.json</b> file to update the site.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        function adminPanel() {
            return {
                isLoggedIn: false,
                password: '',
                error: false,
                newProduct: { id: Date.now(), name: '', price: '', image: '', category: 'Rings' },
                productList: [], // هنسحب اللي في الـ JSON هنا
                
                async init() {
                    const res = await fetch('products.json');
                    this.productList = await res.json();
                },

                login() {
                    if(this.password === 'SB123') { // الباسورد السري بتاعك
                        this.isLoggedIn = true;
                        this.error = false;
                    } else {
                        this.error = true;
                    }
                },

                addProduct() {
                    if(this.newProduct.name && this.newProduct.price) {
                        this.productList.push({...this.newProduct, id: Date.now(), price: parseFloat(this.newProduct.price)});
                        this.newProduct = { id: Date.now(), name: '', price: '', image: '', category: 'Rings' };
                    }
                },

                copyToClipboard() {
                    navigator.clipboard.writeText(JSON.stringify(this.productList, null, 2));
                    alert('JSON Copied! Now paste it into products.json');
                }
            }
        }
    </script>
</body>
</html>
